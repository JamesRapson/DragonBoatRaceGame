<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dragon Boat Race</title>
    <link rel="stylesheet" href="/src/client/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="stage">
        <canvas id="game"></canvas>

        <!-- HUD overlay -->
        <div id="hud" class="hud-top">
          <div class="hud-card">
            <div class="hud-label">SPEED</div>
            <div class="hud-value"><span id="hud-speed">3.5</span> <span class="hud-unit">m/s</span></div>
            <div class="hud-bar"><div id="hud-speed-bar" class="hud-bar-fill speed"></div></div>
          </div>
          <div class="hud-card center">
            <div class="hud-label">POSITION</div>
            <div class="hud-value"><span id="hud-pos">1</span><span class="hud-unit" id="hud-pos-sfx">st</span> <span class="hud-unit">/ <span id="hud-total">6</span></span></div>
            <div class="hud-sub"><span id="hud-dist">500</span> m to go</div>
          </div>
          <div class="hud-card">
            <div class="hud-label">FATIGUE</div>
            <div class="hud-value"><span id="hud-fatigue">0</span><span class="hud-unit">%</span></div>
            <div class="hud-bar"><div id="hud-fatigue-bar" class="hud-bar-fill fatigue"></div></div>
          </div>
        </div>

        <div id="power-banner" class="power-banner hidden">&#9889; Power 10 &mdash; sprinting</div>

        <div id="toast" class="toast hidden"></div>

        <!-- Controls -->
        <div id="controls" class="controls">
          <button id="btn-left" class="ctrl ctrl-round" aria-label="Move left">&#8592;</button>
          <button id="btn-power" class="ctrl ctrl-power">&#9889; Power 10</button>
          <button id="btn-right" class="ctrl ctrl-round" aria-label="Move right">&#8594;</button>
        </div>

        <!-- Start / finish overlay -->
        <div id="overlay" class="overlay">
          <div class="overlay-box">
            <svg class="dragon" viewBox="0 0 210 150" role="img" aria-label="Dragon">
              <path d="M86 54 Q60 30 50 10 Q74 22 98 50 Z" fill="#e3a93c"/>
              <path d="M100 50 Q82 28 82 8 Q98 24 110 46 Z" fill="#c98a26"/>
              <path d="M74 64 Q46 58 34 74 Q52 72 58 84 Q42 88 34 104 Q56 96 70 100 Q66 80 74 64 Z" fill="#9a3520"/>
              <path d="M72 56 Q92 42 116 48 Q150 50 178 56 Q200 60 196 72 Q192 80 172 76 Q172 86 150 86 L120 86 Q90 90 70 80 Q60 68 72 56 Z" fill="#d85a30" stroke="#7a2e15" stroke-width="2.5" stroke-linejoin="round"/>
              <path d="M120 86 Q146 88 184 94 Q160 106 118 96 Z" fill="#b8431f" stroke="#7a2e15" stroke-width="2.5" stroke-linejoin="round"/>
              <path d="M150 84 l4 8 l4 -8 Z M164 82 l4 8 l4 -8 Z" fill="#fff"/>
              <path d="M150 95 l4 -7 l4 7 Z M133 96 l4 -7 l4 7 Z" fill="#fff"/>
              <path d="M92 54 Q104 48 116 54" fill="none" stroke="#7a2e15" stroke-width="3" stroke-linecap="round"/>
              <circle cx="106" cy="62" r="7" fill="#fff"/>
              <circle cx="108" cy="63" r="3.5" fill="#1b1b1b"/>
              <ellipse cx="186" cy="64" rx="3" ry="2.2" fill="#7a2e15"/>
            </svg>
            <h1 id="overlay-title">Dragon Boat Race</h1>
            <p id="overlay-text">Reach the finish line first. Steer with &#8592; &#8594; (or the buttons), and hold Power 10 (or Space) to sprint — but it drains your fatigue.</p>
            <div id="menu" class="menu">
              <button id="btn-practice" class="ctrl ctrl-power big">Practice vs AI</button>
              <button id="btn-multiplayer" class="ctrl ctrl-power big">Multiplayer</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
